<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GainZone · SPORT · red/orange edge · white buttons</title>
    <style>
        /* ---------- RESET / GLOBAL – sporty white / red-orange gradient ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* energetic white → orange → red gradient – sport feel */
            background: linear-gradient(145deg, #ffffff 0%, #ff7e5f 40%, #d43f31 100%);
            background-attachment: fixed;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding-top: 58px; /* space for taller sport header */

            /* subtle sport texture – tiny diagonal lines like carbon / mesh */
            background-image: 
                repeating-linear-gradient(45deg, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 4px, transparent 4px, transparent 12px),
                radial-gradient(circle at 30% 70%, rgba(255, 200, 120, 0.25) 0%, transparent 30%);
            background-blend-mode: overlay;
        }

        /* ---------- SPORT HEADER – red/orange shape, white buttons ---------- */
        .header-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 58px;
            background: #b13e2c;  /* deep red base – part of shape */
            background: linear-gradient(120deg, #ff4f2a 0%, #c6311e 70%);
            border-bottom: 4px solid #fcd34d; /* energetic yellow stripe */
            display: flex;
            align-items: center;
            padding: 0 24px;
            color: white;
            letter-spacing: 0.5px;
            font-size: 16px;
            font-weight: 600;
            z-index: 100;
            gap: 20px;
            box-shadow: 0 6px 0 #9b2c1d, 0 10px 20px rgba(0, 0, 0, 0.3);
            /* dynamic shape – cut angle to mimic sport tape / flag */
            clip-path: polygon(0 0, 100% 0, 98% 100%, 0 100%);
        }

        /* red/orange logo shape — capsule with stripe */
        .header-logo-shape {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fcd34d;  /* bright yellow contrast */
            border-radius: 40px 12px 40px 12px;  /* dynamic sport shape */
            padding: 8px 20px;
            transform: skewX(-6deg);  /* active angle */
            box-shadow: inset -2px -2px 0 #b45309, 4px 4px 0 rgba(0,0,0,0.2);
        }

        .header-logo-shape span {
            font-weight: 800;
            font-size: 24px;
            letter-spacing: 2px;
            color: #c0392b;  /* deep red inside shape */
            transform: skewX(6deg);  /* counter skew so text stays straight */
            text-shadow: 2px 2px 0 #fde68a;
        }

        .desktop-nav {
            display: flex;
            gap: 12px;
            margin-left: 8px;
            flex: 1 1 auto;
            align-items: center;
        }

        /* WHITE BUTTONS – pure white, sporty rounded */
        .nav-btn {
            background: white;
            border: none;
            color: #c0392b;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            padding: 8px 20px;
            border-radius: 30px 8px 30px 8px;  /* dynamic cut */
            cursor: pointer;
            box-shadow: 0 5px 0 #a5221a, 0 8px 12px rgba(160, 40, 20, 0.4);
            transition: all 0.1s ease-out;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            border: 2px solid #fcd34d;  /* sporty yellow outline */
            transform: skewX(-5deg);
            line-height: 1;
        }

        .nav-btn span {
            display: inline-block;
            transform: skewX(5deg); /* keep text straight */
        }

        .nav-btn:hover {
            background: #fef9c3;
            transform: skewX(-5deg) translateY(3px);
            box-shadow: 0 2px 0 #a5221a, 0 6px 12px rgba(200, 60, 20, 0.5);
        }

        .nav-btn:active {
            transform: skewX(-5deg) translateY(6px);
            box-shadow: 0 1px 0 #a5221a;
        }

        /* right info – white and bold */
        .right-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-left: auto;
            white-space: nowrap;
        }

        .user-logo {
            width: 38px;
            height: 38px;
            background: #fcd34d;
            border-radius: 50% 20% 50% 20%;  /* sporty irregular */
            border: 3px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #b13e2c;
            font-weight: 900;
            box-shadow: 0 5px 0 #a5221a;
            transform: rotate(4deg);
        }

        .balance-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            text-shadow: 3px 3px 0 #a13020;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px 16px;
            border-radius: 40px;
            border: 2px solid #fcd34d;
            backdrop-filter: blur(2px);
            transform: skewX(-3deg);
        }

        .green-dot, .red-dot {
            width: 16px;
            height: 16px;
            border-radius: 4px 10px 4px 10px;  /* sporty diamond shape */
            display: inline-block;
            box-shadow: 0 2px 0 #7b341e;
        }
        .green-dot { background: #a3e635; }  /* lime green – sport */
        .red-dot   { background: #ff8a80; }

        /* hamburger – white / yellow sporty */
        .hamburger {
            display: none;
            width: 46px;
            height: 46px;
            flex-direction: column;
            justify-content: space-around;
            padding: 10px 8px;
            cursor: pointer;
            background: white;
            border: 3px solid #fcd34d;
            border-radius: 12px 4px 12px 4px;
            transition: 0.1s;
            box-shadow: 0 5px 0 #a13020;
        }
        .hamburger span {
            display: block;
            height: 4px;
            background: #b13e2c;
            border-radius: 4px;
        }
        .hamburger:hover {
            background: #fcd34d;
        }
        .hamburger:hover span {
            background: #b13e2c;
        }

        /* ---------- DARK MODERN MENU but with sporty red/orange accents ---------- */
        .accordion-menu {
            position: fixed;
            top: 58px;
            left: 0;
            width: 100%;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            background: #2d0c0a;  /* deep red base */
            background: linear-gradient(125deg, #3d130f 0%, #691f18 100%);
            border-bottom: 5px solid #fcd34d;
            border-top: 3px solid #ffb347;
            box-shadow: 0 20px 30px rgba(160, 30, 10, 0.6);
            z-index: 99;
            font-family: 'Inter', sans-serif;
        }
        .accordion-menu.open {
            max-height: 560px;
        }

        /* mobile user row – sporty glass */
        .mobile-user-row {
            padding: 20px 20px;
            background: rgba(255, 255, 255, 0.15);
            border-bottom: 4px solid #fcd34d;
            display: flex;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .mobile-user-info {
            display: flex;
            align-items: center;
            gap: 32px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mobile-user-logo {
            width: 54px;
            height: 54px;
            background: #fcd34d;
            border-radius: 30% 10% 30% 10%;
            border: 4px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 900;
            color: #b13e2c;
            transform: rotate(-2deg);
            box-shadow: 6px 6px 0 #80281e;
        }

        .mobile-balances {
            display: flex;
            gap: 25px;
        }

        .mobile-balance-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 800;
            color: white;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 24px;
            border-radius: 60px;
            border: 3px solid #fcd34d;
            backdrop-filter: blur(4px);
            text-shadow: 3px 3px 0 #8b2d20;
            transform: skewX(-3deg);
        }

        .mobile-green-dot, .mobile-red-dot {
            width: 24px;
            height: 24px;
            border-radius: 6px 14px 6px 14px;
            display: inline-block;
            box-shadow: 0 4px 0 #5c1d14;
        }
        .mobile-green-dot { background: #bef264; }
        .mobile-red-dot   { background: #ffa38f; }

        /* menu items – sporty brutalist */
        .menu-item {
            padding: 20px 28px;
            color: white;
            font-size: 20px;
            font-weight: 700;
            border-bottom: 2px solid #fcd34d;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.2);
            transition: 0.15s ease;
            cursor: pointer;
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            gap: 16px;
            text-shadow: 3px 3px 0 #7a2d21;
            border-left: 6px solid transparent;
        }
        .menu-item:last-child { border-bottom: none; }

        .menu-item:before {
            content: "⚡";   /* sport lightning */
            font-size: 28px;
            color: #fcd34d;
            filter: drop-shadow(0 2px 2px black);
        }

        .menu-item:hover {
            background: #b8432f;
            border-left: 6px solid #fcd34d;
            padding-left: 40px;
            color: white;
            text-shadow: 0 0 8px #ffe484;
        }

        /* overlay sport scanline */
        .accordion-menu::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(45deg, rgba(255,220,100,0.1) 0px, rgba(255,220,100,0.1) 6px, transparent 6px, transparent 16px);
            pointer-events: none;
        }

        /* responsive */
        @media (max-width: 740px) {
            .desktop-nav, .right-info {
                display: none;
            }
            .hamburger {
                display: flex;
                margin-left: auto;
            }
            .header-bar {
                padding: 0 16px;
            }
            .header-logo-shape span {
                font-size: 20px;
            }
        }

        @media (min-width: 741px) {
            .right-info {
                display: flex;
            }
        }
    </style>
</head>
<body>

<!-- SPORT HEADER – red/orange shape + white buttons -->
<div class="header-bar">
    <!-- logo shape – red/orange block with yellow accent (red/orange overall) -->
    <div class="header-logo-shape">
        <span>GAINZONE</span>
    </div>

    <div class="desktop-nav">
        <button class="nav-btn"><span>OVERVIEW</span></button>
        <button class="nav-btn"><span>ANALYTICS</span></button>
        <button class="nav-btn"><span>REPORTS</span></button>
        <button class="nav-btn"><span>CONTACT</span></button>
    </div>

    <div class="right-info">
        <div class="user-logo">U</div>
        <div class="balance-item"><span class="green-dot"></span> 1,240</div>
        <div class="balance-item"><span class="red-dot"></span> 382</div>
    </div>

    <div class="hamburger" id="hamburgerBtn">
        <span></span>
        <span></span>
        <span></span>
    </div>
</div>

<!-- MOBILE ACCORDION MENU – sporty red/orange style with white buttons removed? menu items styled white but ok -->
<div class="accordion-menu" id="accordionMenu">
    <div class="mobile-user-row">
        <div class="mobile-user-info">
            <div class="mobile-user-logo">U</div>
            <div class="mobile-balances">
                <div class="mobile-balance-item"><span class="mobile-green-dot"></span> 1,240</div>
                <div class="mobile-balance-item"><span class="mobile-red-dot"></span> 382</div>
            </div>
        </div>
    </div>
    <div class="menu-item">DASHBOARD</div>
    <div class="menu-item">ANALYTICS</div>
    <div class="menu-item">REPORTS</div>
    <div class="menu-item">CONTACT</div>
    <div class="menu-item">SETTINGS</div>
</div>

<!-- SCRIPT (identical but robust) -->
<script>
    (function() {
        const hamburger = document.getElementById('hamburgerBtn');
        const accordion = document.getElementById('accordionMenu');

        function toggleMenu() {
            accordion.classList.toggle('open');
        }

        hamburger.addEventListener('click', function(e) {
            e.stopPropagation();
            toggleMenu();
        });

        const menuItems = document.querySelectorAll('.menu-item');
        menuItems.forEach(item => {
            item.addEventListener('click', function() {
                accordion.classList.remove('open');
            });
        });

        document.body.addEventListener('click', function(e) {
            if (accordion.classList.contains('open') && 
                !hamburger.contains(e.target) && 
                !accordion.contains(e.target)) {
                accordion.classList.remove('open');
            }
        });

        accordion.addEventListener('click', function(e) {
            e.stopPropagation();
        });
    })();
</script>

<!-- 
    UPDATE SUMMARY:
    • Header background turned into red/orange gradient (white/orange/red sport vibe)
    • Logo area: red/orange shape (via capsule with skew & yellow accent) – text "GAINZONE"
    • Buttons: pure white, sporty dynamic cut, yellow outline, deep shadow – bold.
    • Right panel balances now sporty white background with dots.
    • Menu also got red/orange tones, lightning bolts, sporty borders.
    • No banners / promo – just pure sport attitude.
-->
</body>
</html>
